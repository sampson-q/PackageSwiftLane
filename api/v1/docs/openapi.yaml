openapi: "3.0.3"
info:
  title: PackageSwiftLane REST API
  version: "1.0.0"
  description: |
    Production REST API for the PackageSwiftLane / DEPRIXA PRO shipping management
    platform. All protected endpoints require a Bearer token obtained via
    `POST /api/v1/auth/login`.

    **Authentication**

    ```
    Authorization: Bearer <token>
    ```

    **Response envelope**

    Every response uses the following envelope:

    ```json
    {
      "success": true,
      "data": { ... },
      "meta": { ... },     // present on paginated lists
      "error": null,
      "message": null,
      "errors": null       // present on validation failures (HTTP 422)
    }
    ```

    **Pagination query params** (all list endpoints):

    | Param       | Default | Notes              |
    |-------------|---------|--------------------|
    | `page`      | 1       | 1-based page index |
    | `per_page`  | 15      | Max 100            |
    | `sort`      | varies  | Column to sort by  |
    | `direction` | DESC    | ASC or DESC        |

servers:
  - url: /api/v1
    description: Production (relative path)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hex64

  schemas:
    # ── Pagination meta ───────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:        { type: integer, example: 150 }
        per_page:     { type: integer, example: 15  }
        current_page: { type: integer, example: 1   }
        last_page:    { type: integer, example: 10  }
        from:         { type: integer, nullable: true }
        to:           { type: integer, nullable: true }

    # ── Errors ────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:   { type: string,  example: not_found }
        message: { type: string,  example: Resource not found }
        errors:
          type: object
          nullable: true
          additionalProperties: { type: string }

    # ── Auth ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:    { type: string, example: johndoe }
        password:    { type: string, format: password }
        remember_me: { type: boolean, default: false }
        name:        { type: string,  description: "Optional token label" }

    LoginResponse:
      type: object
      properties:
        token:      { type: string, example: "a1b2c3d4..." }
        token_type: { type: string, example: Bearer }
        expires_at: { type: string, format: date-time }
        user:       { $ref: '#/components/schemas/User' }

    User:
      type: object
      properties:
        id:         { type: integer }
        username:   { type: string  }
        email:      { type: string, format: email }
        first_name: { type: string  }
        last_name:  { type: string  }
        phone:      { type: string, nullable: true }
        userlevel:  { type: integer }
        active:     { type: boolean }
        locker:     { type: string, nullable: true }
        name_off:   { type: string, nullable: true }
        agency_id:  { type: integer, nullable: true }
        created:    { type: string, format: date-time, nullable: true }

    # ── Shipments ─────────────────────────────────────────────────────────────
    Shipment:
      type: object
      properties:
        id:                        { type: integer  }
        order_prefix:              { type: string   }
        order_no:                  { type: string   }
        tracking_number:           { type: string   }
        order_date:                { type: string, format: date-time }
        sender_id:                 { type: integer  }
        sender_name:               { type: string, nullable: true }
        receiver_id:               { type: integer  }
        receiver_name:             { type: string, nullable: true }
        agency:                    { type: integer  }
        order_courier:             { type: integer  }
        order_service_options:     { type: integer  }
        order_deli_time:           { type: integer  }
        order_payment_method:      { type: integer  }
        driver_id:                 { type: integer  }
        status:                    { type: integer  }
        status_label:              { type: string, nullable: true }
        status_color:              { type: string, nullable: true }
        status_invoice:            { type: integer  }
        is_pickup:                 { type: boolean  }
        is_consolidate:            { type: boolean  }
        total_weight:              { type: number   }
        sub_total:                 { type: number   }
        total_tax:                 { type: number   }
        total_order:               { type: number   }
        due_date:                  { type: string, format: date-time, nullable: true }
        order_incomplete:          { type: boolean  }

    CreateShipmentRequest:
      type: object
      required:
        - sender_id
        - sender_address_id
        - recipient_id
        - recipient_address_id
        - agency
        - origin_off
        - order_item_category
        - order_package
        - order_courier
        - order_service_options
        - order_deli_time
        - order_payment_method
        - status_courier
        - order_date
      properties:
        sender_id:              { type: integer }
        sender_address_id:      { type: integer }
        recipient_id:           { type: integer }
        recipient_address_id:   { type: integer }
        agency:                 { type: integer }
        origin_off:             { type: integer }
        order_item_category:    { type: integer }
        order_package:          { type: integer }
        order_courier:          { type: integer }
        order_service_options:  { type: integer }
        order_deli_time:        { type: integer }
        order_payment_method:   { type: integer }
        status_courier:         { type: integer }
        driver_id:              { type: integer, default: 0 }
        order_date:             { type: string, format: date }
        packages:
          type: array
          items:
            type: object
            properties:
              qty:            { type: integer, minimum: 1 }
              description:    { type: string }
              length:         { type: number }
              width:          { type: number }
              height:         { type: number }
              weight:         { type: number }
              declared_value: { type: number }

    # ── Customers ─────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:              { type: integer  }
        username:        { type: string   }
        email:           { type: string, format: email }
        first_name:      { type: string   }
        last_name:       { type: string   }
        phone:           { type: string, nullable: true }
        gender:          { type: string, enum: [M, F, O], nullable: true }
        notes:           { type: string, nullable: true }
        newsletter:      { type: boolean  }
        active:          { type: boolean  }
        locker:          { type: string, nullable: true }
        document_type:   { type: string, nullable: true }
        document_number: { type: string, nullable: true }
        agency_id:       { type: integer, nullable: true }
        created:         { type: string, format: date-time, nullable: true }

    # ── Recipients ────────────────────────────────────────────────────────────
    Recipient:
      type: object
      properties:
        id:         { type: integer }
        first_name: { type: string  }
        last_name:  { type: string  }
        email:      { type: string, format: email }
        phone:      { type: string, nullable: true }
        sender_id:  { type: integer }
        agency_id:  { type: integer, nullable: true }

    # ── Tracking ──────────────────────────────────────────────────────────────
    TrackingResult:
      type: object
      properties:
        type:             { type: string, enum: [shipment, package, consolidation] }
        tracking_number:  { type: string }
        status:           { type: integer }
        status_label:     { type: string }
        status_color:     { type: string }
        order_date:       { type: string, format: date-time, nullable: true }
        total_order:      { type: number }
        events:
          type: array
          items:
            type: object
            properties:
              t_date:       { type: string, format: date-time }
              comments:     { type: string }
              status_label: { type: string }
              status_color: { type: string }

    # ── Pre-alerts ────────────────────────────────────────────────────────────
    PreAlert:
      type: object
      properties:
        id:             { type: integer }
        tracking:       { type: string  }
        provider:       { type: string, nullable: true }
        courier_id:     { type: integer }
        courier_name:   { type: string, nullable: true }
        customer_id:    { type: integer }
        customer_name:  { type: string, nullable: true }
        price:          { type: number  }
        description:    { type: string, nullable: true }
        estimated_date: { type: string, format: date, nullable: true }
        prealert_date:  { type: string, format: date-time, nullable: true }
        invoice_url:    { type: string, nullable: true }

    # ── Notification ─────────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:          { type: integer }
        description: { type: string  }
        type:        { type: integer }
        date:        { type: string, format: date-time }
        read:        { type: boolean }

paths:
  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: Obtain a Bearer token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                allOf:
                  - properties:
                      success: { type: boolean, example: true }
                      data:    { $ref: '#/components/schemas/LoginResponse' }
        "401": { description: Invalid credentials }
        "403": { description: Account inactive }
        "422": { description: Validation error }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current token
      responses:
        "200": { description: Token revoked }
        "401": { description: Not authenticated }

  /auth/me:
    get:
      tags: [Auth]
      summary: Return the authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/User' }
        "401": { description: Not authenticated }

  # ════════════════════════════════════════════════════════════════════════════
  # SHIPMENTS
  # ════════════════════════════════════════════════════════════════════════════
  /shipments:
    get:
      tags: [Shipments]
      summary: List shipments (paginated)
      parameters:
        - { name: page,       in: query, schema: { type: integer, default: 1 } }
        - { name: per_page,   in: query, schema: { type: integer, default: 15 } }
        - { name: search,     in: query, schema: { type: string } }
        - { name: status,     in: query, schema: { type: integer } }
        - { name: agency_id,  in: query, schema: { type: integer } }
        - { name: sender_id,  in: query, schema: { type: integer } }
        - { name: date_from,  in: query, schema: { type: string, format: date } }
        - { name: date_to,    in: query, schema: { type: string, format: date } }
        - { name: sort,       in: query, schema: { type: string, enum: [order_id, order_date, total_order], default: order_id } }
        - { name: direction,  in: query, schema: { type: string, enum: [ASC, DESC], default: DESC } }
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Shipment' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Shipments]
      summary: Create a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateShipmentRequest' }
      responses:
        "201": { description: Created }
        "422": { description: Validation error }

  /shipments/{id}:
    get:
      tags: [Shipments]
      summary: Get one shipment (with packages + tracking history)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Shipment detail }
        "404": { description: Not found }
    delete:
      tags: [Shipments]
      summary: Soft-delete a shipment
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }
        "404": { description: Not found }

  /shipments/{id}/status:
    patch:
      tags: [Shipments]
      summary: Update shipment status and add tracking event
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:   { type: integer }
                comments: { type: string }
      responses:
        "200": { description: Status updated }
        "422": { description: Validation error }

  # ════════════════════════════════════════════════════════════════════════════
  # CUSTOMERS
  # ════════════════════════════════════════════════════════════════════════════
  /customers:
    get:
      tags: [Customers]
      summary: List customers
      parameters:
        - { name: page,      in: query, schema: { type: integer } }
        - { name: per_page,  in: query, schema: { type: integer } }
        - { name: search,    in: query, schema: { type: string  } }
        - { name: active,    in: query, schema: { type: integer, enum: [0, 1] } }
        - { name: direction, in: query, schema: { type: string  } }
      responses:
        "200": { description: Paginated list }
    post:
      tags: [Customers]
      summary: Create a customer
      responses:
        "201": { description: Created }

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get a customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Customer }
        "404": { description: Not found }
    put:
      tags: [Customers]
      summary: Update a customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Updated }
        "404": { description: Not found }

  /customers/{id}/addresses:
    get:
      tags: [Customers]
      summary: List a customer's addresses
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Address list }
        "404": { description: Not found }

  # ════════════════════════════════════════════════════════════════════════════
  # RECIPIENTS
  # ════════════════════════════════════════════════════════════════════════════
  /recipients:
    get:
      tags: [Recipients]
      summary: List recipients
      responses:
        "200": { description: Paginated list }
    post:
      tags: [Recipients]
      summary: Create a recipient
      responses:
        "201": { description: Created }

  /recipients/{id}:
    get:
      tags: [Recipients]
      summary: Get a recipient
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Recipient }
        "404": { description: Not found }
    put:
      tags: [Recipients]
      summary: Update a recipient
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Updated }

  /recipients/{id}/addresses:
    get:
      tags: [Recipients]
      summary: List a recipient's addresses
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Address list }

  # ════════════════════════════════════════════════════════════════════════════
  # TRACKING (public – no auth)
  # ════════════════════════════════════════════════════════════════════════════
  /tracking/{order_no}:
    get:
      tags: [Tracking]
      summary: Public shipment tracking
      security: []
      parameters:
        - { name: order_no, in: path, required: true, schema: { type: string }, example: "SHIP-00042" }
      responses:
        "200":
          description: Tracking result
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/TrackingResult' }
        "404": { description: Not found }

  # ════════════════════════════════════════════════════════════════════════════
  # PRE-ALERTS
  # ════════════════════════════════════════════════════════════════════════════
  /pre-alerts:
    get:
      tags: [Pre-alerts]
      summary: List pre-alerts
      parameters:
        - { name: page,     in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
        - { name: search,   in: query, schema: { type: string  } }
      responses:
        "200": { description: Paginated list }
    post:
      tags: [Pre-alerts]
      summary: Create a pre-alert (supports multipart/form-data for file upload)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [tracking, provider, courier_id, price, description, date]
              properties:
                tracking:    { type: string, minLength: 4, maxLength: 55 }
                provider:    { type: string }
                courier_id:  { type: integer }
                price:       { type: number, minimum: 0 }
                description: { type: string }
                date:        { type: string, format: date }
          multipart/form-data:
            schema:
              type: object
              properties:
                tracking:     { type: string }
                provider:     { type: string }
                courier_id:   { type: integer }
                price:        { type: number }
                description:  { type: string }
                date:         { type: string, format: date }
                file_invoice: { type: string, format: binary }
      responses:
        "201": { description: Created }
        "409": { description: Duplicate tracking }
        "422": { description: Validation error }

  /pre-alerts/{id}:
    get:
      tags: [Pre-alerts]
      summary: Get a pre-alert
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Pre-alert }
        "404": { description: Not found }
    delete:
      tags: [Pre-alerts]
      summary: Delete a pre-alert
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }
        "404": { description: Not found }

  # ════════════════════════════════════════════════════════════════════════════
  # REFERENCES
  # ════════════════════════════════════════════════════════════════════════════
  /references/countries:
    get: { tags: [References], summary: "List countries",       responses: { "200": { description: OK } } }
  /references/states:
    get:
      tags: [References]
      summary: "List states/provinces"
      parameters:
        - { name: country_id, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }
  /references/cities:
    get:
      tags: [References]
      summary: "List cities"
      parameters:
        - { name: state_id, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }
  /references/couriers:
    get: { tags: [References], summary: "List courier companies",  responses: { "200": { description: OK } } }
  /references/statuses:
    get: { tags: [References], summary: "List shipment statuses",  responses: { "200": { description: OK } } }
  /references/packaging:
    get: { tags: [References], summary: "List packaging types",    responses: { "200": { description: OK } } }
  /references/shipping-modes:
    get: { tags: [References], summary: "List shipping modes",     responses: { "200": { description: OK } } }
  /references/delivery-times:
    get: { tags: [References], summary: "List delivery times",     responses: { "200": { description: OK } } }
  /references/categories:
    get: { tags: [References], summary: "List item categories",    responses: { "200": { description: OK } } }
  /references/offices:
    get: { tags: [References], summary: "List offices",            responses: { "200": { description: OK } } }
  /references/branches:
    get: { tags: [References], summary: "List branch offices",     responses: { "200": { description: OK } } }
  /references/payment-methods:
    get: { tags: [References], summary: "List active payment methods", responses: { "200": { description: OK } } }

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ════════════════════════════════════════════════════════════════════════════
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current user
      parameters:
        - { name: page,     in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
        - { name: unread,   in: query, schema: { type: boolean } }
      responses:
        "200": { description: Paginated notifications }

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Marked read }
        "404": { description: Not found }

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        "200": { description: All marked read }

tags:
  - { name: Auth,          description: "Token-based authentication" }
  - { name: Shipments,     description: "Courier shipment CRUD"      }
  - { name: Customers,     description: "Customer (shipper) CRUD"    }
  - { name: Recipients,    description: "Recipient CRUD"             }
  - { name: Tracking,      description: "Public tracking (no auth)"  }
  - { name: Pre-alerts,    description: "Pre-alert CRUD"             }
  - { name: References,    description: "Read-only catalog data"     }
  - { name: Notifications, description: "In-app notifications"       }
